name: 🌡️ Daily Skew-T Log-P Update

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 UTC 00:00 = KST 09:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-skewt:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      - name: 🔤 한글 폰트 설치 (Noto Sans CJK — SIL OFL 1.1)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -fv
          echo "[✓] 폰트 설치 완료"

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 📦 의존성 설치
        run: pip install -r requirements.txt

      - name: 🔑 Secret 확인
        env:
          KMA_API_URL: ${{ secrets.KMA_API_URL }}
        run: |
          if [ -z "$KMA_API_URL" ]; then
            echo "❌ KMA_API_URL Secret이 설정되어 있지 않습니다."
            echo "   GitHub → Settings → Secrets → New repository secret"
            exit 1
          fi
          echo "✅ KMA_API_URL 확인됨"

      - name: 🌡️ 단열선도 생성
        env:
          KMA_API_URL: ${{ secrets.KMA_API_URL }}
        run: python skewt_plot.py

      - name: 📤 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ README.md
          if git diff --staged --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            KST_TIME=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
            git commit -m "🌡️ 단열선도 자동 갱신 [${KST_TIME}]"
            git push
          fi
